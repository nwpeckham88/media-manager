services:
  media-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-manager
    ports:
      - "8080:8080"
    environment:
      MM_HOST: 0.0.0.0
      MM_PORT: 8080
      MM_LIBRARY_ROOTS: /media/movies:/media/tv
      MM_STATE_DIR: /app/.mm-state
      # MM_API_TOKEN: change-me
    volumes:
      - ./state:/app/.mm-state
      - /srv/media/movies:/media/movies
      - /srv/media/tv:/media/tv
    restart: unless-stopped
