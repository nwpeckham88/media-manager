services:
  media-manager:
    platform: linux/arm64/v8
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-manager
    init: true
    ports:
      - "${ORANGEPI_PUBLISHED_PORT:-8080}:8080"
    environment:
      MM_HOST: ${MM_HOST:-0.0.0.0}
      MM_PORT: ${MM_PORT:-8080}
      MM_LIBRARY_ROOTS: ${MM_LIBRARY_ROOTS:-/media/movies:/media/tv}
      MM_STATE_DIR: ${MM_STATE_DIR:-/app/.mm-state}
      MM_FFMPEG_PATH: ${MM_FFMPEG_PATH:-/usr/lib/jellyfin-ffmpeg/ffmpeg}
      MM_FFPROBE_PATH: ${MM_FFPROBE_PATH:-/usr/lib/jellyfin-ffmpeg/ffprobe}
      MM_MEDIAINFO_PATH: ${MM_MEDIAINFO_PATH:-/usr/bin/mediainfo}
      MM_API_TOKEN: ${MM_API_TOKEN:-}
    volumes:
      - ${HOST_STATE_DIR:-./state}:/app/.mm-state
      - ${HOST_MEDIA_MOVIES_PATH:-/srv/media/movies}:/media/movies
      - ${HOST_MEDIA_TV_PATH:-/srv/media/tv}:/media/tv
    restart: unless-stopped
